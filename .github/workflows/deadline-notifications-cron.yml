name: Deadline Notifications Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-deadline-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger production deadline notification runner
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          RUNNER_URL: https://family-home-miniapp.vercel.app/api/tasks/deadline-notifications/run
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing GitHub secret CRON_SECRET"
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            -X POST "$RUNNER_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
